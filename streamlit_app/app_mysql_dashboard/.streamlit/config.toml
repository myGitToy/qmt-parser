[global]
developmentMode = false

[logger]
level = "error"
messageFormat = "%(asctime)s %(message)s"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[server]
headless = false
runOnSave = false
allowRunOnSave = false
port = 8501
baseUrlPath = ""
enableCORS = false
enableXsrfProtection = true
